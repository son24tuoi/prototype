<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ESP8266 Build Notifier</title>

    <link rel="stylesheet"
          href="css/style.css">
</head>

<body>

    <div id="toast"></div>

    <div class="container">

        <h1>🚀 ESP8266 Build Notifier</h1>

        <div class="layout">

            <!-- LEFT -->

            <div class="left-panel">

                <!-- <div class="card">

                    <div class="status-header">
                        <h2>Trạng thái</h2>
                    </div>

                    <div id="status"
                         class="status-box">
                        Chưa kết nối
                    </div>

                </div> -->

                <div class="card">

                    <div class="log-header">

                        <h2>Log</h2>

                        <button class="danger"
                                onclick="clearLog()">
                            Clear Log
                        </button>

                    </div>

                    <div id="log"
                         class="log"></div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="right-panel">

                <div class="card">

                    <label>ESP8266 IP</label>

                    <input id="ip"
                           placeholder="192.168.1.14">

                    <div class="action-row">

                        <button class="primary"
                                onclick="testConnection()">
                            🔌 Test Connection
                        </button>

                    </div>

                </div>

                <div class="card">

                    <h2>Lệnh nhanh</h2>

                    <div class="grid">

                        <button class="primary"
                                onclick="sendCommand('100')">
                            100 - LuToTahSo
                        </button>

                        <button class="primary"
                                onclick="sendCommand('101')">
                            101 - Hello World
                        </button>

                        <button class="primary"
                                onclick="sendCommand('102')">
                            102 - Config Wifi
                        </button>

                        <button class="primary"
                                onclick="sendCommand('103')">
                            103 - Wifi Connected
                        </button>

                        <button class="success"
                                onclick="sendCommand('200')">
                            200 - Build Success
                        </button>

                        <button class="danger"
                                onclick="sendCommand('201')">
                            201 - Build Failed
                        </button>

                    </div>

                </div>

                <div class="card">

                    <h2>Thông báo tùy chỉnh</h2>

                    <div class="custom-row">

                        <input id="customText"
                               placeholder="Nhập nội dung thông báo">

                    </div>

                    <div class="custom-buttons">

                        <button class="primary"
                                onclick="sendCustom(100)">
                            Gửi
                        </button>

                        <button class="success"
                                onclick="sendCustom(300)">
                            Gửi Success
                        </button>

                        <button class="danger"
                                onclick="sendCustom(301)">
                            Gửi Failed
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
